<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đang chuyển hướng...</title>

  <!-- Meta refresh được gán động bởi JS bên dưới -->

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <style>
    /* Không dùng CSS custom properties (var) để tương thích Android 7 / Chrome 58 */

    *, *::before, *::after {
      -webkit-box-sizing: border-box;
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: 'Be Vietnam Pro', sans-serif;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    .bg-grid {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      background-image:
        -webkit-linear-gradient(rgba(91,141,239,.05) 1px, transparent 1px),
        -webkit-linear-gradient(left, rgba(91,141,239,.05) 1px, transparent 1px);
      background-image:
        linear-gradient(rgba(91,141,239,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,141,239,.05) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    .bg-glow {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      background:
        -webkit-radial-gradient(50% -10%, ellipse cover, rgba(91,141,239,.18) 0%, transparent 70%),
        -webkit-radial-gradient(80% 80%, ellipse cover, rgba(167,139,250,.12) 0%, transparent 60%);
      background:
        radial-gradient(ellipse 70% 55% at 50% -10%, rgba(91,141,239,.18) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 80% 80%, rgba(167,139,250,.12) 0%, transparent 60%);
    }

    /* ── WRAPPER ── */
    .center-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── CARD ── */
    .card {
      width: 100%;
      max-width: 460px;
      background: #13131c;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 44px 40px 40px;
      text-align: center;
      -webkit-box-shadow:
        0 0 0 1px rgba(255,255,255,.04),
        0 24px 64px rgba(0,0,0,.5),
        0 0 80px rgba(91,141,239,.07);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04),
        0 24px 64px rgba(0,0,0,.5),
        0 0 80px rgba(91,141,239,.07);
      -webkit-animation: fadeUp .6s cubic-bezier(.22,1,.36,1) both;
      animation: fadeUp .6s cubic-bezier(.22,1,.36,1) both;
    }

    @-webkit-keyframes fadeUp {
      from { opacity: 0; -webkit-transform: translateY(28px); transform: translateY(28px); }
      to   { opacity: 1; -webkit-transform: translateY(0);    transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── ICON ── */
    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: -webkit-linear-gradient(135deg, rgba(91,141,239,.22), rgba(167,139,250,.18));
      background: linear-gradient(135deg, rgba(91,141,239,.22), rgba(167,139,250,.18));
      border: 1px solid rgba(91,141,239,.35);
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      margin: 0 auto 28px;
      -webkit-animation: pulse 2.4s ease-in-out infinite;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @-webkit-keyframes pulse {
      0%,100% { -webkit-box-shadow: 0 0 0 0 rgba(91,141,239,.4); box-shadow: 0 0 0 0 rgba(91,141,239,.4); }
      50%      { -webkit-box-shadow: 0 0 0 12px rgba(91,141,239,0); box-shadow: 0 0 0 12px rgba(91,141,239,0); }
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(91,141,239,.4); }
      50%      { box-shadow: 0 0 0 12px rgba(91,141,239,0); }
    }

    .icon-wrap svg { width: 28px; height: 28px; }

    /* ── OS BADGE ── */
    .os-badge {
      display: none;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: #6b6b80;
      margin-bottom: 20px;
      letter-spacing: .03em;
    }

    /* ── TEXT ── */
    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -.02em;
      margin-bottom: 10px;
      color: #e8e8f0;
    }

    .subtitle {
      font-size: 15px;
      color: #6b6b80;
      line-height: 1.6;
      margin-bottom: 34px;
    }

    .destination {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      -webkit-box-pack: center;
      -webkit-justify-content: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      background: rgba(91,141,239,.1);
      border: 1px solid rgba(91,141,239,.25);
      border-radius: 8px;
      padding: 6px 14px;
      color: #5b8def;
      word-break: break-all;
      margin-bottom: 34px;
    }

    .destination svg {
      -webkit-flex-shrink: 0;
      flex-shrink: 0;
      margin-right: 6px;
    }

    /* ── PROGRESS RING ── */
    .ring-wrap {
      display: -webkit-box;
      display: -webkit-flex;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-box-direction: normal;
      -webkit-flex-direction: column;
      flex-direction: column;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      margin-bottom: 32px;
    }

    .ring-label {
      font-size: 13px;
      color: #6b6b80;
      font-family: 'Space Mono', monospace;
      margin-top: 14px;
    }

    .ring-label span {
      font-size: 26px;
      font-weight: 700;
      color: #e8e8f0;
      display: block;
      line-height: 1;
      margin-bottom: 2px;
    }

    svg.ring {
      -webkit-transform: rotate(-90deg);
      transform: rotate(-90deg);
      overflow: visible;
    }

    .ring-track {
      fill: none;
      stroke: rgba(255,255,255,.07);
      stroke-width: 5;
    }

    .ring-fill {
      fill: none;
      stroke: url(#ringGrad);
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 251.2;
      stroke-dashoffset: 0;
      -webkit-animation: countdown 5s linear forwards;
      animation: countdown 5s linear forwards;
    }

    @-webkit-keyframes countdown {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: 251.2; }
    }
    @keyframes countdown {
      from { stroke-dashoffset: 0; }
      to   { stroke-dashoffset: 251.2; }
    }

    /* ── BUTTON ── */
    .btn {
      display: -webkit-inline-box;
      display: -webkit-inline-flex;
      display: inline-flex;
      -webkit-box-align: center;
      -webkit-align-items: center;
      align-items: center;
      padding: 12px 26px;
      background: -webkit-linear-gradient(135deg, #5b8def, #a78bfa);
      background: linear-gradient(135deg, #5b8def, #a78bfa);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      -webkit-transition: opacity .2s;
      transition: opacity .2s;
      -webkit-box-shadow: 0 4px 20px rgba(91,141,239,.35);
      box-shadow: 0 4px 20px rgba(91,141,239,.35);
    }

    .btn svg { margin-right: 8px; }
    .btn:active { opacity: .85; }

    /* ── FOOTER NOTE ── */
    .note {
      margin-top: 24px;
      font-size: 12px;
      color: #6b6b80;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="center-wrap">
    <div class="card">

      <!-- Icon -->
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="iconGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#5b8def"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </div>

      <h1 id="pageTitle">Đang chuyển hướng…</h1>
      <p class="subtitle">Bạn sẽ được chuyển đến trang đích trong giây lát.<br/>Vui lòng chờ hoặc nhấn nút bên dưới.</p>

      <!-- OS Badge -->
      <div id="osBadge" class="os-badge"></div>

      <!-- Destination -->
      <div class="destination">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 8v4l3 3"/>
        </svg>
        <span id="destUrl">...</span>
      </div>

      <!-- Countdown ring -->
      <div class="ring-wrap">
        <svg class="ring" width="88" height="88" viewBox="0 0 88 88">
          <defs>
            <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#5b8def"/>
              <stop offset="100%" stop-color="#a78bfa"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="44" cy="44" r="40"/>
          <circle class="ring-fill"  cx="44" cy="44" r="40"/>
        </svg>
        <div class="ring-label">
          <span id="counter">5</span>
          giây còn lại
        </div>
      </div>

      <!-- Manual redirect button -->
      <a id="goBtn" href="#" class="btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        Đi ngay
      </a>

      <p class="note">Nếu không tự chuyển, hãy nhấn nút phía trên.</p>

    </div>
  </div>

  <script>
    // ── BẢNG REDIRECT ─────────────────────────────────────────────
    var REDIRECT_MAP = {
      "ekyc": {
        android: "https://dev-link.dinhcunuocngoai.com.vn/kyc-redirect",
        ios:     "myapp:///kyc-redirect"
      },
      "email": {
        android: "https://dev-link.dinhcunuocngoai.com.vn/email-redirect",
        ios:     "myapp:///email-redirect"
      }
    };

    var SECONDS  = 5;
    var FALLBACK = "https://autumn-droid.github.io/";
    // ──────────────────────────────────────────────────────────────

    // ── DETECT OS ─────────────────────────────────────────────────
    var ua        = navigator.userAgent || "";
    var isIOS     = (/iPad|iPhone|iPod/.test(ua)) && !window.MSStream;
    var isAndroid = /Android/.test(ua);
    var os        = isIOS ? "ios" : "android";
    // ──────────────────────────────────────────────────────────────

    // ── ĐỌC PARAMS (không dùng URLSearchParams — Android 7 WebView có thể thiếu) ──
    function getParam(name) {
      var match = window.location.search.match(
        new RegExp("[?&]" + name + "=([^&]*)")
      );
      return match ? decodeURIComponent(match[1].replace(/\+/g, " ")) : null;
    }

    var key     = (getParam("redirect") || "").toLowerCase();
    var status  = getParam("status");
    var user_id = getParam("user_id");
    // ──────────────────────────────────────────────────────────────

    // ── BUILD TARGET URL ──────────────────────────────────────────
    var TARGET_URL = FALLBACK;
    if (REDIRECT_MAP[key]) {
      var baseUrl  = REDIRECT_MAP[key][os];
      var qsParts  = [];
      if (status)  { qsParts.push("status="  + encodeURIComponent(status)); }
      if (user_id) { qsParts.push("user_id=" + encodeURIComponent(user_id)); }
      TARGET_URL = baseUrl + (qsParts.length ? "?" + qsParts.join("&") : "");
    }
    // ──────────────────────────────────────────────────────────────

    // ── META REFRESH (backup khi JS chậm) ────────────────────────
    var meta = document.createElement("meta");
    meta.httpEquiv = "refresh";
    meta.content   = SECONDS + ";url=" + TARGET_URL;
    document.head.appendChild(meta);
    // ──────────────────────────────────────────────────────────────

    // ── UPDATE UI ─────────────────────────────────────────────────
    var labels = { ekyc: "eKYC", email: "Email" };
    if (labels[key]) {
      document.getElementById("pageTitle").textContent =
        "Đang chuyển hướng " + labels[key] + "\u2026";
    }

    document.getElementById("destUrl").textContent = TARGET_URL;
    document.getElementById("goBtn").href          = TARGET_URL;

    var osBadge = document.getElementById("osBadge");
    var osIcon  = isIOS ? "\uD83C\uDF4E" : (isAndroid ? "\uD83E\uDD16" : "\uD83D\uDCBB");
    var osLabel = isIOS ? "iOS" : (isAndroid ? "Android" : "Desktop");
    osBadge.textContent   = osIcon + " " + osLabel;
    osBadge.style.display = "inline-block";
    // ──────────────────────────────────────────────────────────────

    // ── COUNTDOWN ─────────────────────────────────────────────────
    var remaining = SECONDS;
    var counter   = document.getElementById("counter");

    var tick = setInterval(function() {
      remaining = remaining - 1;
      counter.textContent = remaining;
      if (remaining <= 0) {
        clearInterval(tick);
        window.location.href = TARGET_URL;
      }
    }, 1000);
    // ──────────────────────────────────────────────────────────────
  </script>
</body>
</html>
